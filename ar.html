<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Latin Spot AR Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; }
    #camera { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    #overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ar-item { width: 400px; filter: drop-shadow(0px 20px 25px rgba(0,0,0,0.8)); animation: floatResult 3s ease-in-out infinite; }
    @keyframes floatResult { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
    .price-tag { background: rgba(0,0,0,0.7); color: #39ff14; padding: 10px 20px; border-radius: 20px; font-size: 24px; font-weight: bold; border: 2px solid #39ff14; box-shadow: 0 0 15px rgba(57,255,20,0.5); pointer-events: auto; }
    .add-btn { background: #39ff14; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; margin-top: 30px; cursor: pointer; pointer-events: auto; box-shadow: 0 0 15px rgba(57,255,20,0.5); }
    #loading { position: absolute; z-index: 3; color: white; top: 50%; width: 100%; text-align: center; }
  </style>
</head>
<body>
  <h2 id="loading">Requesting Camera Access...</h2>
  <video id="camera" autoplay playsinline></video>
  <div id="overlay-container" style="display:none;">
    <h1 style="color:white; text-shadow:2px 2px 4px #000; margin-bottom: 20px;">Dominican Quipes</h1>
    <img src="/menu/quipes.webp" class="ar-item" alt="Quipe" />
    <div class="price-tag">$3.99</div>
    <button class="add-btn" onclick="alert('AR Prototype: Added Quipe to Cart! You could seamlessly drop them back into the main website checkout flow from here.')">Pre-Order Quipe</button>
  </div>

  <script>
    const video = document.getElementById('camera');
    const container = document.getElementById('overlay-container');
    const loading = document.getElementById('loading');

    // Access the rear environment camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => {
        video.srcObject = stream;
        loading.style.display = 'none';
        container.style.display = 'flex';
      })
      .catch(err => {
        loading.innerText = "Camera access denied. Please try on a smartphone and ensure HTTPS.";
        container.style.display = 'flex';
      });
  </script>
</body>
</html>
